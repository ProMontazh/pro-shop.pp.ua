<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<title>Оформлення замовлення - ПроЗахист</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Roboto', sans-serif;
    background: #0d0d0d;
    color: #e0e0e0;
    line-height: 1.6;
    min-height: 100vh;
    padding-bottom: 30px;
}

/* Шапка */
.header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
    border-bottom: 2px solid #800000;
    padding: 15px 20px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.header h1 {
    font-size: 1.4em;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
}

.header .subtitle {
    font-size: 0.85em;
    color: #808080;
    margin-top: 3px;
}

/* Основной контейнер */
.container {
    max-width: 600px;
    margin: 0 auto;
    padding: 0 15px;
}

/* Секции */
.section {
    background: linear-gradient(145deg, #1a1a1a, #222);
    border-radius: 16px;
    border: 1px solid #333;
    margin-top: 20px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.section-header {
    background: linear-gradient(145deg, #800000, #600000);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.section-header .icon {
    font-size: 1.3em;
}

.section-header h2 {
    font-size: 1.05em;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.3px;
}

.section-body {
    padding: 20px;
}

/* Номер заказа */
.order-number {
    text-align: center;
    font-size: 1.1em;
    color: #ff4444;
    font-weight: 600;
    margin-bottom: 15px;
    padding: 10px;
    background: rgba(128,0,0,0.1);
    border-radius: 10px;
    border: 1px solid rgba(128,0,0,0.3);
}

/* Карточки товаров */
.cart-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid #333;
    transition: background 0.3s;
}

.cart-item:last-child {
    border-bottom: none;
}

.cart-item .item-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(145deg, #800000, #600000);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4em;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(128,0,0,0.3);
}

.cart-item .item-info {
    flex: 1;
    min-width: 0;
}

.cart-item .item-name {
    font-size: 0.95em;
    color: #e0e0e0;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.cart-item .item-qty {
    font-size: 0.8em;
    color: #808080;
    margin-top: 2px;
}

.cart-item .item-price {
    font-size: 1em;
    font-weight: 700;
    color: #ff4444;
    white-space: nowrap;
}

/* Итоги */
.totals {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 2px solid #333;
}

.total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 0.95em;
}

.total-row .label {
    color: #808080;
}

.total-row .value {
    font-weight: 500;
    color: #e0e0e0;
}

.total-row.discount .value {
    color: #4CAF50;
}

.total-row.final {
    margin-top: 8px;
    padding-top: 12px;
    border-top: 1px solid #444;
    font-size: 1.2em;
}

.total-row.final .label {
    color: #fff;
    font-weight: 700;
}

.total-row.final .value {
    color: #ff4444;
    font-weight: 700;
    font-size: 1.1em;
}

/* Форма */
.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    font-size: 0.9em;
    font-weight: 500;
    color: #ccc;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.form-group label .required {
    color: #ff4444;
    font-size: 0.8em;
}

.form-group input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #333;
    border-radius: 12px;
    font-size: 1em;
    background: #0d0d0d;
    color: #e0e0e0;
    transition: all 0.3s ease;
    font-family: 'Roboto', sans-serif;
}

.form-group input:focus {
    outline: none;
    border-color: #800000;
    box-shadow: 0 0 0 3px rgba(128,0,0,0.2);
    background: #1a1a1a;
}

.form-group input::placeholder {
    color: #555;
}

/* Кнопки */
.button-row {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 25px;
}

.submit-button {
    width: 100%;
    padding: 16px 20px;
    background: linear-gradient(145deg, #800000, #a00000);
    color: #fff;
    font-size: 1.05em;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    text-align: center;
    transition: all 0.3s ease;
    box-shadow: 0 6px 20px rgba(128,0,0,0.4);
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
}

.submit-button:active {
    transform: scale(0.98);
    box-shadow: 0 2px 10px rgba(128,0,0,0.3);
}

.submit-button:hover {
    background: linear-gradient(145deg, #a00000, #c00000);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(128,0,0,0.5);
}

.pay-button {
    background: linear-gradient(145deg, #2b7cff, #1e5fcc);
    box-shadow: 0 6px 20px rgba(43,124,255,0.3);
    display: none;
    opacity: 0;
    transition: all 0.5s ease;
}

.pay-button:hover {
    background: linear-gradient(145deg, #1e5fcc, #154a99);
    box-shadow: 0 8px 25px rgba(43,124,255,0.4);
}

.pay-button.visible {
    display: block;
    opacity: 1;
}

.pay-button .card-icon {
    margin-right: 8px;
    font-size: 1.2em;
}

/* Пустая корзина */
.empty-cart {
    text-align: center;
    padding: 40px 20px;
    color: #666;
}

.empty-cart .icon {
    font-size: 3em;
    margin-bottom: 15px;
    opacity: 0.5;
}

.empty-cart p {
    font-size: 1.1em;
}

/* Toast */
.toast-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s ease;
    z-index: 10000;
    backdrop-filter: blur(5px);
}

.toast-overlay.show {
    opacity: 1;
    visibility: visible;
}

.toast-message {
    background: linear-gradient(145deg, #1a1a1a, #222);
    color: #fff;
    padding: 30px 40px;
    border-radius: 20px;
    font-size: 1.2em;
    text-align: center;
    font-weight: 600;
    border: 2px solid #800000;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transform: scale(0.8) translateY(20px);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 90%;
    width: 320px;
}

.toast-overlay.show .toast-message {
    transform: scale(1) translateY(0);
}

.toast-message .check-icon {
    font-size: 3em;
    display: block;
    margin-bottom: 15px;
}

/* Scrollbar */
::-webkit-scrollbar {
    width: 6px;
}

::-webkit-scrollbar-track {
    background: #0d0d0d;
}

::-webkit-scrollbar-thumb {
    background: #333;
    border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
    background: #800000;
}

/* Анимации */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.fade-in {
    animation: fadeInUp 0.5s ease forwards;
}

/* Мобильная адаптация */
@media (max-width: 480px) {
    .header {
        padding: 12px 15px;
    }
    
    .header h1 {
        font-size: 1.2em;
    }
    
    .container {
        padding: 0 10px;
    }
    
    .section {
        border-radius: 12px;
        margin-top: 12px;
    }
    
    .section-header {
        padding: 12px 15px;
    }
    
    .section-header h2 {
        font-size: 0.95em;
    }
    
    .section-body {
        padding: 15px;
    }
    
    .cart-item {
        padding: 10px 0;
    }
    
    .cart-item .item-icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        font-size: 1.2em;
    }
    
    .cart-item .item-name {
        font-size: 0.9em;
    }
    
    .cart-item .item-price {
        font-size: 0.95em;
    }
    
    .form-group input {
        padding: 12px 14px;
        font-size: 16px; /* Предотвращает зум на iOS */
        border-radius: 10px;
    }
    
    .submit-button {
        padding: 14px 16px;
        font-size: 1em;
        border-radius: 12px;
    }
    
    .button-row {
        gap: 10px;
        margin-top: 20px;
    }
    
    .total-row.final {
        font-size: 1.1em;
    }
    
    .toast-message {
        padding: 25px 30px;
        font-size: 1.1em;
        border-radius: 16px;
    }
}

/* Для очень маленьких экранов */
@media (max-width: 360px) {
    .header h1 {
        font-size: 1.1em;
    }
    
    .section-header h2 {
        font-size: 0.9em;
    }
    
    .cart-item .item-icon {
        width: 34px;
        height: 34px;
    }
}

/* Landscape на мобильных */
@media (max-height: 500px) and (orientation: landscape) {
    .header {
        position: relative;
    }
    
    .toast-message {
        padding: 20px 25px;
    }
}
</style>
</head>
<body>

<div class="header">
    <h1>Оформлення замовлення</h1>
    <div class="subtitle">ПроЗахист — бездротові системи безпеки</div>
</div>

<div class="container">
    <!-- Секция заказа -->
    <div class="section fade-in">
        <div class="section-header">
            <span class="icon">favicon.svg</span>
            <h2 id="order-header">Ваше замовлення</h2>
        </div>
        <div class="section-body">
            <div id="cart-items"></div>
            <div class="totals" id="total-price"></div>
        </div>
    </div>

    <!-- Секция контактов -->
    <div class="section fade-in" style="animation-delay: 0.1s">
        <div class="section-header">
            <span class="icon">📋</span>
            <h2>Контактні дані</h2>
        </div>
        <div class="section-body">
            <form id="checkout-form" action="https://formspree.io/f/xrbadqqk" method="POST">
                <div class="form-group">
                    <label for="name">Прізвище, Ім'я <span class="required">*</span></label>
                    <input type="text" id="name" name="name" placeholder="Іванов Іван" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="phone">Телефон отримувача <span class="required">*</span></label>
                    <input type="tel" id="phone" name="phone" placeholder="+38 (___) ___-__-__" required autocomplete="tel">
                </div>
                <div class="form-group">
                    <label for="city">Місто <span class="required">*</span></label>
                    <input type="text" id="city" name="city" placeholder="Київ" required autocomplete="address-level2">
                </div>
                <div class="form-group">
                    <label for="branch">Відділення "Нової Пошти" <span class="required">*</span></label>
                    <input type="text" id="branch" name="branch" placeholder="№15" required>
                </div>
                <input type="hidden" id="cart-data" name="cart">
                <div class="button-row">
                    <button type="submit" class="submit-button">✓ Підтвердити замовлення</button>
                    <button type="button" id="pay-button" class="submit-button pay-button">
                        <span class="card-icon">💳</span>Сплатити карткою
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="toast-overlay" id="toast">
    <div class="toast-message">
        <span class="check-icon">✅</span>
        Ваше замовлення підтверджено!<br>Дякуємо!
    </div>
</div>

<audio id="cash-sound" src="sound.mp3"></audio>

<script>
// НАЛАШТУВАННЯ PORTMONE
const PORTMONE_CONFIG = {
    payee_id: "ВАШ_PAYEE_ID",
    shop_order_number: "",
    bill_amount: "",
    description: "",
    success_url: window.location.origin + "/success.html",
    failure_url: window.location.origin + "/checkout.html",
    lang: "uk"
};

let cart = JSON.parse(localStorage.getItem('cart')) || [];
let finalTotal = 0;
let currentOrderNumber = "";

// Номер замовлення
function getDailyOrderNumber() {
    const today = new Date().toISOString().slice(0, 10);
    let ordersData = JSON.parse(localStorage.getItem('dailyOrders') || '{}');
    if (!ordersData.date || ordersData.date !== today) {
        ordersData = { date: today, number: 0 };
    }
    ordersData.number = (ordersData.number % 99) + 1;
    localStorage.setItem('dailyOrders', JSON.stringify(ordersData));
    return ordersData.number;
}

function generateOrderNumber() {
    const orderNum = getDailyOrderNumber();
    const now = new Date();
    const day = String(now.getDate()).padStart(2, '0');
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const year = String(now.getFullYear()).slice(-2);
    return `${String(orderNum).padStart(2, '0')}${day}${month}${year}`;
}

// Знижка
function calculateDiscount(total) {
    if (total >= 150000) return 15;
    if (total >= 60000) return 12;
    if (total >= 30000) return 10;
    if (total >= 10000) return 7;
    if (total >= 5000) return 5;
    if (total >= 1000) return 3;
    return 0;
}

// Portmone URL
function createPortmonePayment() {
    return `https://www.portmone.com.ua/r3/uk/gateway/` +
        `?payee_id=${PORTMONE_CONFIG.payee_id}` +
        `&shop_order_number=${PORTMONE_CONFIG.shop_order_number}` +
        `&bill_amount=${PORTMONE_CONFIG.bill_amount}` +
        `&description=${encodeURIComponent(PORTMONE_CONFIG.description)}` +
        `&success_url=${PORTMONE_CONFIG.success_url}` +
        `&failure_url=${PORTMONE_CONFIG.failure_url}` +
        `&lang=${PORTMONE_CONFIG.lang}`;
}

// Отображение заказа
function displayOrder() {
    const container = document.getElementById('cart-items');
    const totalsContainer = document.getElementById('total-price');
    const cartDataField = document.getElementById('cart-data');

    container.innerHTML = '';
    totalsContainer.innerHTML = '';

    if (cart.length === 0) {
        container.innerHTML = `
            <div class="empty-cart">
                <div class="icon">🛒</div>
                <p>Кошик порожній</p>
            </div>
        `;
        document.querySelector('.submit-button').disabled = true;
        document.querySelector('.submit-button').style.opacity = '0.5';
        return;
    }

    let total = 0;
    let cartText = "";

    cart.forEach((item, index) => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        cartText += `${item.name} — ${item.price} грн × ${item.quantity} = ${subtotal} грн\n`;
        
        const itemDiv = document.createElement('div');
        itemDiv.className = 'cart-item';
        itemDiv.style.animationDelay = `${index * 0.1}s`;
        itemDiv.classList.add('fade-in');
        itemDiv.innerHTML = `
            <div class="item-icon">🛡️</div>
            <div class="item-info">
                <div class="item-name">${item.name}</div>
                <div class="item-qty">${item.price} грн × ${item.quantity} шт</div>
            </div>
            <div class="item-price">${subtotal} грн</div>
        `;
        container.appendChild(itemDiv);
    });

    const discountPercent = calculateDiscount(total);
    const discountAmount = (total * discountPercent) / 100;
    finalTotal = total - discountAmount;

    currentOrderNumber = generateOrderNumber();
    document.getElementById('order-header').textContent = `Замовлення №${currentOrderNumber}`;

    // Config Portmone
    PORTMONE_CONFIG.shop_order_number = currentOrderNumber;
    PORTMONE_CONFIG.bill_amount = finalTotal.toFixed(2);
    PORTMONE_CONFIG.description = `Замовлення №${currentOrderNumber} - ПроЗахист`;

    // Totals
    totalsContainer.innerHTML = `
        <div class="total-row">
            <span class="label">Сума:</span>
            <span class="value">${total.toFixed(2)} грн</span>
        </div>
        ${discountPercent > 0 ? `
        <div class="total-row discount">
            <span class="label">Знижка ${discountPercent}%:</span>
            <span class="value">-${discountAmount.toFixed(2)} грн</span>
        </div>
        ` : ''}
        <div class="total-row final">
            <span class="label">До сплати:</span>
            <span class="value">${finalTotal.toFixed(2)} грн</span>
        </div>
    `;

    // Sound effect
    setTimeout(() => {
        const sound = document.getElementById('cash-sound');
        if (sound) {
            sound.volume = 0.15;
            sound.play().catch(() => {});
        }
    }, 500);

    // Show pay button
    setTimeout(() => {
        document.getElementById('pay-button').classList.add('visible');
    }, 1000);

    // Form data
    cartDataField.value = 
        `Номер замовлення: ${currentOrderNumber}\n` +
        cartText +
        `\nЗагальна сума: ${total.toFixed(2)} грн` +
        (discountPercent > 0
            ? `\nЗнижка ${discountPercent}%: - ${discountAmount.toFixed(2)} грн\nДо сплати: ${finalTotal.toFixed(2)} грн`
            : `\nДо сплати: ${finalTotal.toFixed(2)} грн`) +
        `\n\n⚠️ Статус оплати: Очікується`;
}

displayOrder();

// Кнопка "Сплатити"
document.getElementById('pay-button').addEventListener('click', function (e) {
    e.preventDefault();
    
    const form = document.getElementById('checkout-form');
    const inputs = form.querySelectorAll('input[required]');
    const allFilled = Array.from(inputs).every(input => input.value.trim() !== '');
    
    if (!allFilled) {
        // Вибрация на мобильных
        if (navigator.vibrate) navigator.vibrate(200);
        alert('Будь ласка, заповніть всі поля форми!');
        return;
    }
    
    localStorage.setItem('lastOrderNumber', currentOrderNumber);
    
    const cartDataField = document.getElementById('cart-data');
    cartDataField.value = cartDataField.value + '\n\n💳 СПЛАЧЕНО КАРТКОЮ ОНЛАЙН';
    
    const data = new FormData(form);
    fetch(form.action, { 
        method: form.method, 
        body: data, 
        headers: { 'Accept': 'application/json' } 
    })
    .then(response => {
        if (response.ok) {
            window.location.href = createPortmonePayment();
        } else {
            alert("Помилка при надсиланні замовлення.");
        }
    })
    .catch(() => alert("Помилка з'єднання із сервером."));
});

// Кнопка "Підтвердити"
document.getElementById('checkout-form').addEventListener('submit', function (e) {
    e.preventDefault();
    const form = e.target;
    const data = new FormData(form);
    
    fetch(form.action, { 
        method: form.method, 
        body: data, 
        headers: { 'Accept': 'application/json' } 
    })
    .then(response => {
        if (response.ok) {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            setTimeout(() => { 
                toast.classList.remove('show');
                localStorage.removeItem('cart');
                window.location.href = "index.html";
            }, 2500);
        } else {
            alert("Помилка при відправці замовлення.");
        }
    })
    .catch(() => alert("Помилка з'єднання із сервером."));
});

// Автопереход между полями
const inputs = document.querySelectorAll('#name, #phone, #city, #branch');
inputs.forEach((field, index) => {
    field.addEventListener('keydown', function (e) {
        if (e.key === "Enter") {
            e.preventDefault();
            if (index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        }
    });
});

// Маска телефона
document.getElementById('phone').addEventListener('input', function(e) {
    let value = e.target.value.replace(/\D/g, '');
    if (value.startsWith('38')) value = value.slice(2);
    if (value.length > 0) {
        let formatted = '+38';
        if (value.length > 3) formatted += ' (' + value.slice(0, 3);
        else formatted += ' (' + value;
        if (value.length > 3) formatted += ') ' + value.slice(3, 6);
        if (value.length > 6) formatted += '-' + value.slice(6, 8);
        if (value.length > 8) formatted += '-' + value.slice(8, 10);
        e.target.value = formatted;
    } else {
        e.target.value = '';
    }
});

// Мобильная оптимизация клавиатуры
if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
    inputs.forEach(input => {
        input.addEventListener('focus', () => {
            setTimeout(() => {
                input.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        });
    });
}
