<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Оформлення замовлення — ПРОЗАХИСТ</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
        }

        .page-wrapper {
            max-width: 600px;
            margin: 30px auto 40px;
            padding: 0 15px;
        }

        .checkout-box {
            background: #fff;
            box-shadow: 0 0 12px rgba(0,0,0,0.12);
            border-radius: 8px;
            padding: 30px;
            opacity: 0;
            animation: fadeIn 1.2s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* ===== ЗАГОЛОВОК ===== */
        .page-title {
            text-align: center;
            font-size: 1.5em;
            font-weight: 700;
            color: #222;
            margin: 0 0 6px;
        }

        .order-number {
            text-align: center;
            font-size: 1.05em;
            font-weight: 600;
            color: #800000;
            margin-bottom: 20px;
        }

        /* ===== СЕКЦІЇ ===== */
        .section-title {
            font-size: 1em;
            font-weight: 700;
            color: #444;
            margin: 18px 0 8px;
            border-left: 4px solid #800000;
            padding-left: 10px;
        }

        /* ===== СПИСОК ТОВАРІВ ===== */
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 0;
            border-bottom: 1px dotted #ddd;
            font-size: 0.95em;
            color: #333;
            gap: 10px;
        }

        .cart-item-name { flex: 1; }
        .cart-item-price { white-space: nowrap; font-weight: 600; color: #800000; }

        /* ===== ПІДСУМОК ===== */
        .total-block {
            margin-top: 14px;
            background: #f9f9f9;
            border-radius: 6px;
            padding: 12px 16px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.95em;
            margin-bottom: 6px;
            opacity: 0;
            transition: opacity 1.8s ease;
            color: #444;
        }

        .total-row.show { opacity: 1; }
        .total-row.discount { color: #2a8a2a; font-weight: 600; }

        .total-row.final {
            font-size: 1.15em;
            font-weight: 700;
            color: #c00;
            border-top: 1px solid #ddd;
            padding-top: 8px;
            margin-top: 4px;
        }

        /* ===== ФОРМА ===== */
        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            font-size: 0.88em;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
            font-family: 'Open Sans', sans-serif;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus { border-color: #800000; }

        /* ===== КНОПКИ ===== */
        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }

        .btn-confirm {
            flex: 1;
            padding: 12px;
            background: #007bff;
            color: #fff;
            font-size: 1em;
            font-weight: 700;
            font-family: 'Open Sans', sans-serif;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-confirm:hover { background: #0056b3; }

        .btn-pay {
            flex: 1;
            padding: 12px;
            background: #800000;
            color: #fff;
            font-size: 1em;
            font-weight: 700;
            font-family: 'Open Sans', sans-serif;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, opacity 0.5s;
            display: none;
            opacity: 0;
        }

        .btn-pay:hover { background: #a00000; }
        .btn-pay.visible { display: block; opacity: 1; }

        /* ===== TOAST ===== */
        .toast-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s, visibility 0.5s;
            z-index: 10000;
        }

        .toast-overlay.show { opacity: 1; visibility: visible; }

        .toast-message {
            background: #fff;
            border-top: 5px solid #800000;
            color: #222;
            padding: 30px 40px;
            border-radius: 8px;
            font-size: 1.2em;
            text-align: center;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transform: scale(0.8);
            transition: transform 0.4s;
        }

        .toast-overlay.show .toast-message { transform: scale(1); }

        .toast-message span {
            display: block;
            font-size: 2em;
            margin-bottom: 10px;
        }

        /* ===== МОБІЛЬНА ===== */
        @media (max-width: 768px) {
            .page-wrapper { margin-top: 10px; }
            .checkout-box { padding: 20px 16px; border-radius: 0; box-shadow: none; }
            body { background: #fff; }
            .button-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <div class="checkout-box">

        <h1 class="page-title">Оформлення замовлення</h1>
        <div class="order-number" id="order-number">Замовлення №…</div>

        <div class="section-title">Ваше замовлення</div>
        <div id="cart-items"></div>
        <div class="total-block" id="total-block"></div>

        <div class="section-title" style="margin-top:24px;">Контактні дані</div>
        <form id="checkout-form" action="https://formspree.io/f/xrbadqqk" method="POST">
            <div class="form-group">
                <label for="name">Прізвище, Ім'я</label>
                <input type="text" id="name" name="name" placeholder="Іваненко Іван" required>
            </div>
            <div class="form-group">
                <label for="phone">Телефон отримувача</label>
                <input type="tel" id="phone" name="phone" placeholder="+380 XX XXX XX XX" required>
            </div>
            <div class="form-group">
                <label for="city">Місто</label>
                <input type="text" id="city" name="city" placeholder="Харків" required>
            </div>
            <div class="form-group">
                <label for="branch">Номер відділення «Нової Пошти»</label>
                <input type="text" id="branch" name="branch" placeholder="наприклад: 12" required>
            </div>
            <input type="hidden" id="cart-data" name="cart">

            <div class="button-row">
                <button type="submit" class="btn-confirm">✅ Підтвердити</button>
                <button type="button" id="pay-button" class="btn-pay">💳 Сплатити</button>
            </div>
        </form>

    </div>
</div>

<div class="toast-overlay" id="toast">
    <div class="toast-message">
        <span>🎉</span>
        Ваше замовлення підтверджено!<br>Дякуємо!
    </div>
</div>

<audio id="cash-sound" src="sound.mp3"></audio>

<script>
const PORTMONE_CONFIG = {
    payee_id: "ВАШ_PAYEE_ID",
    shop_order_number: "",
    bill_amount: "",
    description: "",
    success_url: window.location.origin + "/success.html",
    failure_url: window.location.origin + "/checkout.html",
    lang: "uk"
};

let cart = JSON.parse(localStorage.getItem('cart')) || [];
let finalTotal = 0;
let currentOrderNumber = "";

function getDailyOrderNumber() {
    const today = new Date().toISOString().slice(0, 10);
    let ordersData = JSON.parse(localStorage.getItem('dailyOrders') || '{}');
    if (!ordersData.date || ordersData.date !== today) {
        ordersData = { date: today, number: 0 };
    }
    ordersData.number = (ordersData.number % 99) + 1;
    localStorage.setItem('dailyOrders', JSON.stringify(ordersData));
    return ordersData.number;
}

function generateOrderNumber() {
    const orderNum = getDailyOrderNumber();
    const now = new Date();
    const day   = String(now.getDate()).padStart(2, '0');
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const year  = String(now.getFullYear()).slice(-2);
    return `${String(orderNum).padStart(2, '0')}${day}${month}${year}`;
}

function calculateDiscount(total) {
    if (total >= 150000) return 15;
    if (total >= 60000)  return 12;
    if (total >= 30000)  return 10;
    if (total >= 10000)  return 7;
    if (total >= 5000)   return 5;
    if (total >= 1000)   return 3;
    return 0;
}

function createPortmonePayment() {
    return `https://www.portmone.com.ua/r3/uk/gateway/` +
        `?payee_id=${PORTMONE_CONFIG.payee_id}` +
        `&shop_order_number=${PORTMONE_CONFIG.shop_order_number}` +
        `&bill_amount=${PORTMONE_CONFIG.bill_amount}` +
        `&description=${encodeURIComponent(PORTMONE_CONFIG.description)}` +
        `&success_url=${PORTMONE_CONFIG.success_url}` +
        `&failure_url=${PORTMONE_CONFIG.failure_url}` +
        `&lang=${PORTMONE_CONFIG.lang}`;
}

function displayOrder() {
    const cartItemsEl  = document.getElementById('cart-items');
    const totalBlockEl = document.getElementById('total-block');
    const cartDataField = document.getElementById('cart-data');

    cartItemsEl.innerHTML = '';
    totalBlockEl.innerHTML = '';

    let total = 0;
    let cartText = "";

    cart.forEach(item => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `<span class="cart-item-name">${item.name} × ${item.quantity}</span>
                         <span class="cart-item-price">${subtotal.toLocaleString('uk-UA')} грн</span>`;
        cartItemsEl.appendChild(div);
        cartText += `${item.name} × ${item.quantity} = ${subtotal} грн\n`;
    });

    const discountPercent = calculateDiscount(total);
    const discountAmount  = (total * discountPercent) / 100;
    finalTotal = total - discountAmount;

    currentOrderNumber = generateOrderNumber();
    document.getElementById('order-number').textContent = `Замовлення №${currentOrderNumber}`;

    PORTMONE_CONFIG.shop_order_number = currentOrderNumber;
    PORTMONE_CONFIG.bill_amount       = finalTotal.toFixed(2);
    PORTMONE_CONFIG.description       = `Замовлення №${currentOrderNumber} — ПРОЗАХИСТ`;

    const row1 = document.createElement('div');
    row1.className = 'total-row show';
    row1.innerHTML = `<span>Сума:</span><span>${total.toLocaleString('uk-UA')} грн</span>`;
    totalBlockEl.appendChild(row1);

    const row2 = document.createElement('div');
    row2.className = 'total-row discount';
    row2.innerHTML = discountPercent > 0
        ? `<span>Знижка ${discountPercent}%:</span><span>−${discountAmount.toFixed(2)} грн</span>`
        : `<span>Знижка:</span><span>0 грн</span>`;
    totalBlockEl.appendChild(row2);
    setTimeout(() => row2.classList.add('show'), 1200);

    const row3 = document.createElement('div');
    row3.className = 'total-row final';
    row3.innerHTML = `<span>До сплати:</span><span>${finalTotal.toLocaleString('uk-UA')} грн</span>`;
    totalBlockEl.appendChild(row3);
    setTimeout(() => {
        row3.classList.add('show');
        const sound = document.getElementById('cash-sound');
        if (sound) { sound.volume = 0.15; sound.play().catch(() => {}); }
    }, 2200);

    cartDataField.value =
        `Номер замовлення: ${currentOrderNumber}\n` + cartText +
        `\nЗагальна сума: ${total} грн` +
        (discountPercent > 0
            ? `\nЗнижка ${discountPercent}%: −${discountAmount.toFixed(2)} грн\nДо сплати: ${finalTotal} грн`
            : `\nДо сплати: ${finalTotal} грн`) +
        `\n\n⚠️ Статус оплати: Очікується`;

    setTimeout(() => {
        document.getElementById('pay-button').classList.add('visible');
    }, 3000);
}

displayOrder();

document.getElementById('pay-button').addEventListener('click', function(e) {
    e.preventDefault();
    const form   = document.getElementById('checkout-form');
    const inputs = form.querySelectorAll('input[required]');
    if (!Array.from(inputs).every(i => i.value.trim() !== '')) {
        alert('Будь ласка, заповніть всі поля форми!');
        return;
    }
    localStorage.setItem('lastOrderNumber', currentOrderNumber);
    document.getElementById('cart-data').value += '\n\n💳 СПЛАЧЕНО КАРТКОЮ ОНЛАЙН';
    const data = new FormData(form);
    fetch(form.action, { method: form.method, body: data, headers: { 'Accept': 'application/json' } })
        .then(r => {
            if (r.ok) window.location.href = createPortmonePayment();
            else alert("Помилка при надсиланні замовлення.");
        })
        .catch(() => alert("Помилка з'єднання із сервером."));
});

document.getElementById('checkout-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const data = new FormData(e.target);
    fetch(e.target.action, { method: e.target.method, body: data, headers: { 'Accept': 'application/json' } })
        .then(r => {
            if (r.ok) {
                document.getElementById('toast').classList.add('show');
                setTimeout(() => {
                    document.getElementById('toast').classList.remove('show');
                    localStorage.removeItem('cart');
                    window.location.href = "index.html";
                }, 2500);
            } else { alert("Помилка при відправці замовлення."); }
        })
        .catch(() => alert("Помилка з'єднання із сервером."));
});

const formInputs = document.querySelectorAll('#name, #phone, #city, #branch');
formInputs.forEach((field, index) => {
    field.addEventListener('keydown', function(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            if (index < formInputs.length - 1) formInputs[index + 1].focus();
        }
    });
});

if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth <= 768) {
    formInputs.forEach(input => {
        input.addEventListener('focus', () => {
            document.body.style.paddingBottom = '300px';
            window.scrollTo(0, document.body.scrollHeight);
        });
        input.addEventListener('blur', () => {
            document.body.style.paddingBottom = '0';
        });
    });
}
</script>

</body>
</html>
