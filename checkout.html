<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Оформлення замовлення — ПРОЗАХИСТ</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #0d0d0d;
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 55px;
            background: linear-gradient(to right, rgba(7,7,7,0.95), rgba(148,148,148,0.95));
            display: flex;
            align-items: center;
            z-index: 1000;
            border-bottom: 2px solid #800000;
            padding: 0;
        }

        header .logo {
            margin-left: -14px;
        }

        header .logo svg { 
            height: 55px; 
            width: auto; 
            display: block; 
        }

        .page-wrapper {
            max-width: 620px;
            margin: 80px auto 50px;
            padding: 0 15px;
        }

        .checkout-box {
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .page-title {
            text-align: center;
            font-size: 1.5em;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .order-number {
            text-align: center;
            font-size: 1em;
            font-weight: 600;
            color: #808080;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 0.85em;
            font-weight: 700;
            color: #ff4444;
            border-left: 3px solid #800000;
            padding-left: 10px;
            margin: 22px 0 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: baseline;
            gap: 8px 14px;
            padding: 9px 0;
            border-bottom: 1px dotted #333;
        }

        .cart-item-name {
            font-size: 0.9em;
            color: #b0b0b0;
            line-height: 1.4;
        }

        .cart-item-qty {
            font-size: 0.85em;
            color: #555;
            white-space: nowrap;
            text-align: right;
        }

        .cart-item-price {
            font-size: 0.9em;
            font-weight: 600;
            color: #808080;
            white-space: nowrap;
            text-align: right;
            min-width: 95px;
        }

        .total-block {
            margin-top: 16px;
            background: #222;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 14px 16px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95em;
            margin-bottom: 8px;
            color: #666;
            opacity: 0;
            transition: opacity 1.8s ease;
        }

        .total-row.show { opacity: 1; }

        .total-row.discount {
            color: #2e7d32;
            font-weight: 600;
        }

        .total-row.no-discount { color: #444; }

        .total-row.final {
            font-size: 1.15em;
            font-weight: 700;
            color: #808080;
            border-top: 1px solid #3a3a3a;
            padding-top: 10px;
            margin-top: 2px;
            margin-bottom: 0;
        }

        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            font-size: 0.82em;
            font-weight: 600;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: #222;
            border: 1px solid #444;
            border-radius: 5px;
            font-size: 1em;
            font-family: 'Open Sans', sans-serif;
            color: #e0e0e0;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input::placeholder { color: #444; }

        .form-group input:focus {
            border-color: #800000;
            box-shadow: 0 0 0 2px rgba(128,0,0,0.2);
        }

        .form-group input.error {
            border-color: #ff4444;
            box-shadow: 0 0 0 2px rgba(255,68,68,0.2);
        }

        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-action {
            flex: 1;
            padding: 13px 10px;
            font-size: 1em;
            font-weight: 700;
            font-family: 'Open Sans', sans-serif;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: background 0.3s, transform 0.1s;
        }

        .btn-action:active { transform: scale(0.97); }

        .btn-confirm {
            background: linear-gradient(145deg, #800000, #a00000);
            color: #fff;
        }

        .btn-confirm:hover { background: linear-gradient(145deg, #a00000, #c00000); }

        .btn-pay {
            background: #2b7cff;
            color: #fff;
            display: none;
            opacity: 0;
            transition: background 0.3s, opacity 0.5s;
        }

        .btn-pay:hover { background: #1e5fcc; }
        .btn-pay.visible { display: block; opacity: 1; }

        .toast-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s, visibility 0.5s;
            z-index: 10000;
        }

        .toast-overlay.show { opacity: 1; visibility: visible; }

        .toast-message {
            background: #1a1a1a;
            border: 1px solid #444;
            border-top: 4px solid #800000;
            color: #e0e0e0;
            padding: 30px 40px;
            border-radius: 8px;
            font-size: 1.2em;
            text-align: center;
            font-weight: 700;
            box-shadow: 0 4px 30px rgba(0,0,0,0.6);
            transform: scale(0.8);
            transition: transform 0.4s;
            max-width: 90%;
        }

        .toast-overlay.show .toast-message { transform: scale(1); }

        .toast-icon { font-size: 2em; display: block; margin-bottom: 10px; }

        @media (max-width: 768px) {
            .page-wrapper { margin-top: 70px; padding: 0; }

            .checkout-box {
                border-radius: 0;
                border-left: none;
                border-right: none;
                padding: 20px 16px;
            }

            .button-row { flex-direction: column; }

            .cart-item {
                grid-template-columns: 1fr auto;
                grid-template-rows: auto auto;
            }

            .cart-item-name { grid-column: 1 / -1; }
            .cart-item-qty  { grid-column: 1; }
            .cart-item-price { grid-column: 2; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="200" height="55" viewBox="0 0 600 200">
            <defs>
                <linearGradient id="wave-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="-0.3" stop-color="#999">
                        <animate attributeName="offset" values="-0.3; 1.3; 1.3" keyTimes="0; 0.5; 1" dur="15s" repeatCount="indefinite" begin="2s" />
                    </stop>
                    <stop offset="-0.15" stop-color="#ffffff">
                        <animate attributeName="offset" values="-0.15; 1.45; 1.45" keyTimes="0; 0.5; 1" dur="15s" repeatCount="indefinite" begin="2s" />
                    </stop>
                    <stop offset="0" stop-color="#999">
                        <animate attributeName="offset" values="0; 1.6; 1.6" keyTimes="0; 0.5; 1" dur="15s" repeatCount="indefinite" begin="2s" />
                    </stop>
                </linearGradient>
                <linearGradient id="pro-wave" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="-0.3" stop-color="#800000">
                        <animate attributeName="offset" values="-0.3; 1.3; 1.3" keyTimes="0; 0.25; 1" dur="4.2s" begin="10s; 25s; 40s; 55s; 70s" fill="freeze" />
                    </stop>
                    <stop offset="-0.15" stop-color="#ff4444">
                        <animate attributeName="offset" values="-0.15; 1.45; 1.45" keyTimes="0; 0.25; 1" dur="4.2s" begin="10s; 25s; 40s; 55s; 70s" fill="freeze" />
                    </stop>
                    <stop offset="0" stop-color="#800000">
                        <animate attributeName="offset" values="0; 1.6; 1.6" keyTimes="0; 0.25; 1" dur="4.2s" begin="10s; 25s; 40s; 55s; 70s" fill="freeze" />
                    </stop>
                </linearGradient>
                <linearGradient id="zahist-wave" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="-0.3" stop-color="#808080">
                        <animate attributeName="offset" values="-0.3; 1.3; 1.3" keyTimes="0; 0.25; 1" dur="5s" begin="10.7s; 25.7s; 40.7s; 55.7s; 70.7s" fill="freeze" />
                    </stop>
                    <stop offset="-0.15" stop-color="#e0e0e0">
                        <animate attributeName="offset" values="-0.15; 1.45; 1.45" keyTimes="0; 0.25; 1" dur="5s" begin="10.7s; 25.7s; 40.7s; 55.7s; 70.7s" fill="freeze" />
                    </stop>
                    <stop offset="0" stop-color="#808080">
                        <animate attributeName="offset" values="0; 1.6; 1.6" keyTimes="0; 0.25; 1" dur="5s" begin="10.7s; 25.7s; 40.7s; 55.7s; 70.7s" fill="freeze" />
                    </stop>
                </linearGradient>
            </defs>
            <text x="15" y="100" font-family="Open Sans, sans-serif" font-weight="bold" font-size="74" fill="url(#pro-wave)">ПРО</text>
            <text x="172" y="100" font-family="Open Sans, sans-serif" font-weight="bold" font-size="74" fill="url(#zahist-wave)">ЗАХИСТ</text>
            <text x="15" y="160" font-family="Arial, sans-serif" font-weight="bold" font-size="33" fill="url(#wave-gradient)">БЕЗДРОТОВІ СИСТЕМИ БЕЗПЕКИ</text>
            <line x1="483" y1="65" x2="523" y2="48" stroke="#800000" stroke-width="10" />
            <line x1="523" y1="48" x2="563" y2="65" stroke="#800000" stroke-width="10" />
            <line x1="493" y1="70" x2="493" y2="100" stroke="#808080" stroke-width="10" />
            <line x1="553" y1="70" x2="553" y2="100" stroke="#808080" stroke-width="10" />
        </svg>
    </div>
</header>

<div class="page-wrapper">
    <div class="checkout-box">

        <h1 class="page-title">Оформлення замовлення</h1>
        <div class="order-number" id="order-number">Замовлення №…</div>

        <div class="section-title">Ваше замовлення</div>
        <div id="cart-items"></div>
        <div class="total-block" id="total-block"></div>

        <div class="section-title">Контактні дані</div>
        <form id="checkout-form" action="https://formspree.io/f/xrbadqqk" method="POST" novalidate>
            <div class="form-group">
                <label for="name">Прізвище, Ім'я</label>
                <input type="text" id="name" name="name" placeholder="Прізвище, Ім'я">
            </div>
            <div class="form-group">
                <label for="phone">Телефон отримувача</label>
                <input type="tel" id="phone" name="phone" placeholder="+38(0XX)-XXX-XX-XX">
            </div>
            <div class="form-group">
                <label for="city">Місто</label>
                <input type="text" id="city" name="city" placeholder="Місто">
            </div>
            <div class="form-group">
                <label for="branch">Номер відділення «Нової Пошти»<img src="images/nova-poshta.png" alt="Нова Пошта" style="height: 18px; width: 18px; vertical-align: middle; margin: 0 4px 5px; background: #fff; padding: 1px; border-radius: 3px; object-fit: contain;"> </label>
                <input type="tel" id="branch" name="branch" placeholder="Номер відділення" inputmode="numeric" pattern="[0-9]*">
            </div>
            <input type="hidden" id="cart-data" name="cart">

            <div class="button-row">
                <button type="submit" class="btn-action btn-confirm">Підтвердити</button>
                <button type="button" id="pay-button" class="btn-action btn-pay">Сплатити карткою</button>
            </div>
        </form>

    </div>
</div>

<div class="toast-overlay" id="toast">
    <div class="toast-message">
        <span class="toast-icon">🎉</span>
        Ваше замовлення підтверджено!<br>Дякуємо за покупку!
    </div>
</div>

<audio id="cash-sound" src="sound.mp3"></audio>

<script>
const PORTMONE_CONFIG = {
    payee_id: "ВАШ_PAYEE_ID",
    shop_order_number: "",
    bill_amount: "",
    description: "",
    success_url: window.location.origin + "/success.html",
    failure_url: window.location.origin + "/checkout.html",
    lang: "uk"
};

let cart = JSON.parse(localStorage.getItem('cart')) || [];
let finalTotal = 0;
let currentOrderNumber = "";

function getDailyOrderNumber() {
    const today = new Date().toISOString().slice(0, 10);
    let data = JSON.parse(localStorage.getItem('dailyOrders') || '{}');
    if (!data.date || data.date !== today) data = { date: today, number: 0 };
    data.number = (data.number % 99) + 1;
    localStorage.setItem('dailyOrders', JSON.stringify(data));
    return data.number;
}

function generateOrderNumber() {
    const n   = getDailyOrderNumber();
    const now = new Date();
    const d   = String(now.getDate()).padStart(2,'0');
    const m   = String(now.getMonth()+1).padStart(2,'0');
    const y   = String(now.getFullYear()).slice(-2);
    return `${String(n).padStart(2,'0')}${d}${m}${y}`;
}

function calculateDiscount(total) {
    if (total >= 150000) return 15;
    if (total >= 100000)  return 12;
    if (total >= 60000)  return 10;
    if (total >= 30000)  return 7;
    if (total >= 10000)   return 5;
    if (total >= 5000)   return 3;
    return 0;
}

function fmt(n) {
    return n.toLocaleString('uk-UA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function createPortmonePayment() {
    return `https://www.portmone.com.ua/r3/uk/gateway/` +
        `?payee_id=${PORTMONE_CONFIG.payee_id}` +
        `&shop_order_number=${PORTMONE_CONFIG.shop_order_number}` +
        `&bill_amount=${PORTMONE_CONFIG.bill_amount}` +
        `&description=${encodeURIComponent(PORTMONE_CONFIG.description)}` +
        `&success_url=${PORTMONE_CONFIG.success_url}` +
        `&failure_url=${PORTMONE_CONFIG.failure_url}` +
        `&lang=${PORTMONE_CONFIG.lang}`;
}

function displayOrder() {
    const cartItemsEl   = document.getElementById('cart-items');
    const totalBlockEl  = document.getElementById('total-block');
    const cartDataField = document.getElementById('cart-data');

    cartItemsEl.innerHTML  = '';
    totalBlockEl.innerHTML = '';

    let total    = 0;
    let cartText = "";

    cart.forEach(item => {
        const subtotal = item.price * item.quantity;
        total += subtotal;

        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML =
            `<span class="cart-item-name">${item.name}</span>` +
            `<span class="cart-item-qty">${fmt(item.price)} × ${item.quantity} шт.</span>` +
            `<span class="cart-item-price">${fmt(subtotal)} грн</span>`;
        cartItemsEl.appendChild(div);
        cartText += `${item.name} — ${fmt(item.price)} × ${item.quantity} шт. = ${fmt(subtotal)} грн\n`;
    });

    const discountPercent = calculateDiscount(total);
    const discountAmount  = parseFloat((total * discountPercent / 100).toFixed(2));
    finalTotal = parseFloat((total - discountAmount).toFixed(2));

    currentOrderNumber = generateOrderNumber();
    document.getElementById('order-number').textContent = `Замовлення №${currentOrderNumber}`;

    PORTMONE_CONFIG.shop_order_number = currentOrderNumber;
    PORTMONE_CONFIG.bill_amount       = finalTotal.toFixed(2);
    PORTMONE_CONFIG.description       = `Замовлення №${currentOrderNumber} — ПРОЗАХИСТ`;

    const row1 = document.createElement('div');
    row1.className = 'total-row show';
    row1.innerHTML = `<span>Загальна сума:</span><span>${fmt(total)} грн</span>`;
    totalBlockEl.appendChild(row1);

    // ===== ИЗМЕНЕНО: убран % из отображения =====
    const row2 = document.createElement('div');
    row2.className = discountPercent > 0 ? 'total-row discount' : 'total-row no-discount';
    row2.innerHTML = discountPercent > 0
        ? `<span>Знижка:</span><span>− ${fmt(discountAmount)} грн</span>`  // было: Знижка ${discountPercent}%
        : `<span>Знижка:</span><span>0.00 грн</span>`;
    totalBlockEl.appendChild(row2);
    setTimeout(() => row2.classList.add('show'), 1000);

    const row3 = document.createElement('div');
    row3.className = 'total-row final';
    row3.innerHTML = `<span>До сплати:</span><span>${fmt(finalTotal)} грн</span>`;
    totalBlockEl.appendChild(row3);
    setTimeout(() => {
        row3.classList.add('show');
        const sound = document.getElementById('cash-sound');
        if (sound) { sound.volume = 0.15; sound.play().catch(() => {}); }
    }, 2000);

    // ===== ИЗМЕНЕНО: убран % из скрытого поля формы =====
    cartDataField.value =
        `Номер замовлення: ${currentOrderNumber}\n` + cartText +
        `\nЗагальна сума: ${fmt(total)} грн` +
        (discountPercent > 0
            ? `\nЗнижка: −${fmt(discountAmount)} грн\nДо сплати: ${fmt(finalTotal)} грн`  // было: Знижка ${discountPercent}%
            : `\nДо сплати: ${fmt(finalTotal)} грн`) +
        `\n\n⚠️ Статус оплати: Очікується`;

    setTimeout(() => {
        document.getElementById('pay-button').classList.add('visible');
    }, 3000);
}

displayOrder();

function validateForm() {
    const inputs = [
        { id: 'name', label: 'Прізвище, Ім\'я' },
        { id: 'phone', label: 'Телефон', minLen: 6 },
        { id: 'city', label: 'Місто' },
        { id: 'branch', label: 'Номер відділення' }
    ];
    
    for (let item of inputs) {
        const input = document.getElementById(item.id);
        const val = input.value.trim();
        
        if (item.id === 'phone' && (val === '' || val === '+38' || val === '+38(' || val.length < 6)) {
            input.classList.add('error');
            input.focus();
            scrollToField(input);
            return false;
        }
        
        if (val === '') {
            input.classList.add('error');
            input.focus();
            scrollToField(input);
            return false;
        }
        
        input.classList.remove('error');
    }
    return true;
}

function scrollToField(input) {
    setTimeout(() => {
        const rect = input.getBoundingClientRect();
        const headerHeight = 55;
        if (rect.top < headerHeight + 10) {
            window.scrollBy({ 
                top: rect.top - headerHeight - 20, 
                behavior: 'smooth' 
            });
        }
    }, 100);
}

document.getElementById('pay-button').addEventListener('click', function(e) {
    e.preventDefault();
    if (!validateForm()) return;
    
    localStorage.setItem('lastOrderNumber', currentOrderNumber);
    document.getElementById('cart-data').value += '\n\n💳 СПЛАЧЕНО КАРТКОЮ ОНЛАЙН';
    const data = new FormData(document.getElementById('checkout-form'));
    fetch(document.getElementById('checkout-form').action, { 
        method: 'POST', 
        body: data, 
        headers: { 'Accept': 'application/json' } 
    })
    .then(r => {
        if (r.ok) window.location.href = createPortmonePayment();
        else alert("Помилка при надсиланні замовлення.");
    })
    .catch(() => alert("Помилка з'єднання із сервером."));
});

document.getElementById('checkout-form').addEventListener('submit', function(e) {
    e.preventDefault();
    if (!validateForm()) return;
    
    const form = e.target;
    const data = new FormData(form);
    
    fetch(form.action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } })
    .then(r => {
        if (r.ok) {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
                localStorage.removeItem('cart');
                window.location.href = "index.html";
            }, 2500);
        } else { 
            alert("Помилка при відправці замовлення."); 
        }
    })
    .catch(() => alert("Помилка з'єднання із сервером."));
});

const phoneInput = document.getElementById('phone');

phoneInput.addEventListener('focus', function() {
    if (!this.value || this.value === '') {
        this.value = '+38';
    }
});

phoneInput.addEventListener('blur', function() {
    if (this.value === '+38' || this.value === '+38(') {
        this.value = '';
    }
});

phoneInput.addEventListener('input', function(e) {
    let val = e.target.value;
    
    if (!val.startsWith('+38')) {
        val = '+38' + val.replace(/^\+?3?8?/, '');
    }
    
    let digits = val.slice(3).replace(/\D/g, '');
    if (digits.length > 10) digits = digits.slice(0, 10);
    
    let out = '+38';
    if (digits.length >= 1) out += '(' + digits.slice(0, 1);
    if (digits.length >= 2) out += digits.slice(1, 2);
    if (digits.length >= 3) out += digits.slice(2, 3);
    if (digits.length >= 3) out += ')';
    if (digits.length >= 4) out += '-' + digits.slice(3, 4);
    if (digits.length >= 5) out += digits.slice(4, 5);
    if (digits.length >= 6) out += digits.slice(5, 6);
    if (digits.length >= 6) out += '-';
    if (digits.length >= 7) out += digits.slice(6, 7);
    if (digits.length >= 8) out += digits.slice(7, 8);
    if (digits.length >= 8) out += '-';
    if (digits.length >= 9) out += digits.slice(8, 9);
    if (digits.length >= 10) out += digits.slice(9, 10);
    
    e.target.value = out;
});

phoneInput.addEventListener('click', function() {
    if (this.value === '+38') {
        this.setSelectionRange(3, 3);
    }
});

const formInputs = document.querySelectorAll('#name, #phone, #city, #branch');
formInputs.forEach((field, index) => {
    field.addEventListener('keydown', function(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            if (index < formInputs.length - 1) formInputs[index + 1].focus();
        }
    });
});

if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth <= 768) {
    formInputs.forEach(input => {
        input.addEventListener('focus', () => {
            setTimeout(() => {
                const rect = input.getBoundingClientRect();
                const headerHeight = 55;
                if (rect.top < headerHeight + 10) {
                    window.scrollBy({ 
                        top: rect.top - headerHeight - 20, 
                        behavior: 'smooth' 
                    });
                }
            }, 350);
        });
    });
}
</script>
